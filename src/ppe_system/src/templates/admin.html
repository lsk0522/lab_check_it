<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Admin Dashboard</title>
    <!-- Lamborghini System Fallback Font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFC000; /* Lamborghini Gold */
            --primary-active: #917300;
            --ink: #FFFFFF;
            --body: #7D7D7D; /* Ash */
            --canvas: #000000; /* Absolute Black */
            --canvas-elevated: #202020; /* Charcoal */
            --canvas-light: #F8F8F8;
            --body-on-light: #202020;
            --hairline: #202020;
            --semantic-success: #29ABE2; /* Cyan Pulse */
            --semantic-warning: #FFC000;
            --spacing-xxxs: 4px;
            --spacing-xs: 16px;
            --spacing-md: 32px;
            --spacing-lg: 48px;
            --spacing-xxl: 96px;
        }

        /* 
           Lamborghini Typography Guidelines
           ALL-CAPS dominant, tight line-heights, Open Sans fallback
        */
        body {
            background-color: var(--canvas);
            color: var(--body);
            font-family: 'Open Sans', sans-serif;
            font-weight: 400;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            text-transform: uppercase;
        }

        /* Top Nav on Dark */
        header {
            background-color: var(--canvas);
            color: var(--ink);
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-lg);
            border-bottom: 1px solid var(--hairline);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.4px;
        }

        .header-logo {
            color: var(--ink);
            font-weight: 700;
            font-size: 24px;
            margin-right: auto;
            letter-spacing: 0px;
        }
        
        .header-logo span {
            color: var(--primary);
        }

        /* Hero Band Cinema */
        .hero {
            background-color: var(--canvas);
            padding: var(--spacing-xxl) var(--spacing-lg);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-container {
            width: 100%;
            max-width: 640px;
            margin-bottom: var(--spacing-md);
            border: 1px solid var(--hairline);
            border-radius: 0px;
            background-color: #000;
        }

        .video-container img {
            width: 100%;
            display: block;
        }

        .hero h1 {
            color: var(--ink);
            font-size: 80px; /* Display 2 */
            font-weight: 400;
            line-height: 1.13;
            letter-spacing: normal;
            margin: 0 0 var(--spacing-md) 0;
        }

        /* Status Display */
        .status-badge {
            display: inline-block;
            background-color: var(--canvas-elevated);
            color: var(--ink);
            font-size: 54px; /* Section Title */
            font-weight: 400;
            line-height: 1.19;
            padding: 24px 64px;
            border-radius: 0px; /* Uncompromising rectangles */
            border: 2px solid var(--hairline);
            transition: all 0.3s ease;
        }

        .status-badge.PASS {
            background-color: var(--semantic-success);
            border-color: var(--semantic-success);
            color: var(--canvas); /* Black text on Cyan */
            font-weight: 700;
        }

        .status-badge.FAIL {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--canvas); /* Black text on Gold */
            font-weight: 700;
        }

        /* Grid Layout */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg) var(--spacing-xxl);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-xs);
        }

        /* Feature Card (Driver Card style) */
        .card {
            background-color: var(--canvas-elevated);
            color: var(--ink);
            padding: 24px;
            border-radius: 0px;
            border: 1px solid var(--hairline);
        }

        .card h2 {
            font-size: 24px; /* Card Title */
            font-weight: 400;
            margin: 0 0 16px 0;
            color: var(--ink);
        }

        .number-display {
            font-size: 80px;
            font-weight: 400;
            line-height: 1.13;
            color: var(--ink);
            margin: 0;
        }

        .number-display.accent {
            color: var(--primary);
        }

        .card-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card-list li {
            padding: 12px 0;
            border-bottom: 1px solid var(--hairline);
            font-size: 14px;
            color: var(--ink);
            display: flex;
            justify-content: space-between;
        }

        .card-list li:last-child {
            border-bottom: none;
        }

        .timestamp {
            color: var(--body);
            font-size: 12px;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-logo">SUNGGWAN <span>PPE SYSTEM</span></div>
        <div>LIVE MONITORING</div>
    </header>

    <div class="hero">
        <div class="video-container">
            <img src="/video_feed" alt="Live Camera Feed">
        </div>
        <h1>STATUS: <span id="main-status" class="status-badge WAITING">WAITING</span></h1>
        <p style="color: var(--body); font-size: 18px; margin-top: 16px;">
            Currently detected items: <span id="detected-items" style="color: var(--ink); font-weight: 700;">-</span>
        </p>
    </div>

    <div class="container">
        <!-- Stats Card 1 -->
        <div class="card">
            <h2>TOTAL SCANS TODAY</h2>
            <div class="number-display" id="total-scans">0</div>
        </div>
        
        <!-- Stats Card 2 -->
        <div class="card">
            <h2>SAFETY VIOLATIONS</h2>
            <div class="number-display accent" id="total-violations">0</div>
        </div>

        <!-- Log Card -->
        <div class="card">
            <h2>RECENT DETECTIONS</h2>
            <ul class="card-list" id="log-list">
                <li><span style="color: var(--body);">No recent activity</span></li>
            </ul>
        </div>
    </div>

    <script>
        // Fetch data via AJAX polling
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update Status Badge
                const badge = document.getElementById('main-status');
                badge.innerText = data.status;
                badge.className = 'status-badge ' + data.status;

                // Update Items
                document.getElementById('detected-items').innerText = 
                    data.items.length > 0 ? data.items.join(', ') : 'None';
                
                // Update Stats
                document.getElementById('total-scans').innerText = data.stats.total;
                document.getElementById('total-violations').innerText = data.stats.violations;

                // Update Logs
                const logList = document.getElementById('log-list');
                if (data.logs.length > 0) {
                    logList.innerHTML = '';
                    data.logs.forEach(log => {
                        const li = document.createElement('li');
                        li.innerHTML = `<span>${log.status}</span> <span class="timestamp">${log.time}</span>`;
                        logList.appendChild(li);
                    });
                }
            } catch (error) {
                console.error("Error fetching status:", error);
            }
        }

        // Poll every 1 second
        setInterval(fetchStatus, 1000);
        fetchStatus();
    </script>
</body>
</html>
